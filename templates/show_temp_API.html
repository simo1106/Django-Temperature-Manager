<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <title>即時溫溼度顯示</title>
    
    <style>
        .fnav{
            text-align: center;
        }

    </style>
    <script>
    // 頁面載入
    $(function(){
        refresh();
        setInterval(countDown, 1000); // 每1秒更新一次倒數計時
    });

    function refresh(){
        console.log("開始刷新");
        $.get("/show_temp/", function(data){
            let temperature = data.temperature;
            let humidity = data.humidity;

            //console.log("temperature:" + temperature);
            //console.log("humidity:" + humidity);

            $("#temperature").val(temperature + " °C");
            $("#humidity").val(humidity + " %");

        }).fail(function() {
            console.error("無法獲取資料");
            $("#temperature").val("無資料");
            $("#humidity").val("無資料");
        });
    }
    var timer2 = 5; // global variable
    function countDown(){
        if(timer2 == 0){
            timer2 = 5;
            refresh();
        }
        $(".countdown").text("距離下一次更新還有 " + timer2 + " 秒");
        timer2 -= 1;
    }
</script>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-4">
            <h3>目前溫濕度</h3>
        </div>
        <div class="row justify-content-center mt-4">
            <div class="col-md-2" id="temperature_title">
                <label for="temperature_title">目前溫度</label>
            </div>
            <div class="col-md-2">
                <input type="text" value="無資料" id="temperature" disabled>
            </div>
        </div>
        <div class="row justify-content-center mt-4">
            <div class="col-md-2" id="humidity_title">
                <label for="humidity_title">目前濕度</label>
            </div>
            <div class="col-md-2">
                <input type="text" value="無資料" id="humidity" disabled>
            </div>
        </div>
        <div class="row justify-content-center mt-4">
            <div class="col-auto countdown">距離下一次更新還有 5 秒</div>
        </div>

        <nav id="footer">
            <div class="container mt-4">
                <div class="fnav">
                    <p>Copyring @2024 <a href="">tony yeh</a> ALL rights reserved.</p>
                </div>
            </div>
        </nav>
    </div>
</body>
</html>
